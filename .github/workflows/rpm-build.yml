name: Build RPM Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64
            runner: ubuntu-latest
            fedora_image: fedora:41

          - platform: aarch64
            runner: ubuntu-24.04-arm
            fedora_image: fedora:41

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Build RPM package via fedpkg mockbuild
        run: |
          echo "=== Running fedpkg mockbuild in Fedora container ==="
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            ${{ matrix.fedora_image }} \
            bash -c "
              set -euo pipefail
              dnf install -y fedpkg mock rpmdevtools
              useradd -m builder
              usermod -aG mock builder
              chown -R builder:builder /build
              runuser -u builder -- bash -c 'cd /build && spectool -g *.spec && fedpkg mockbuild'
            "

      - name: List built packages
        run: |
          echo "=== Built packages ==="
          find "${{ github.workspace }}/results_"* \
            -name '*.rpm' -type f 2>/dev/null | head -20

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages-${{ matrix.platform }}
          path: ${{ github.workspace }}/results_*/**/*.rpm
          exclude: ${{ github.workspace }}/results_*/**/*.src.rpm

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: srpm-packages-${{ matrix.platform }}
          path: ${{ github.workspace }}/results_*/**/*.src.rpm

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-packages-*"
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.rpm
